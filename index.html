<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Address Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #f5f5f2;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      background: #ffffff;
      border: 1px solid #ddddd8;
      border-radius: 10px;
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #ebebeb;
    }

    .app-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .app-subtitle {
      font-size: 12.5px;
      color: #888;
      margin-top: 2px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .search-row input {
      flex: 1;
      height: 38px;
      padding: 0 12px;
      border: 1px solid #ddddd8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-row input:focus {
      border-color: #378ADD;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.12);
    }

    .search-row input::placeholder { color: #aaa; }

    .btn {
      height: 38px;
      padding: 0 18px;
      background: #1a7fb5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn:hover { background: #155f88; }
    .btn:active { background: #0f4a6b; }

    .result-wrap { display: none; }

    .result-banner {
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-banner.match    { border: 1px solid #a8d07a; background: #f4faed; }
    .result-banner.no-match { border: 1px solid #f0c8c8; background: #fdf3f3; }
    .result-banner.error    { border: 1px solid #e8dfc0; background: #fdfaf0; }
    .result-banner.loading  { border: 1px solid #ddddd8; background: #fafaf8; }

    .banner-icon { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .banner-body { flex: 1; }

    .banner-headline { font-size: 14px; font-weight: 600; line-height: 1.4; }
    .result-banner.match    .banner-headline { color: #2d5a0e; }
    .result-banner.no-match .banner-headline { color: #8b1f1f; }
    .result-banner.error    .banner-headline { color: #7a6010; }
    .result-banner.loading  .banner-headline { color: #555; }

    .info-cards { display: flex; flex-direction: column; gap: 8px; }

    .info-card {
      border: 1px solid #ddddd8;
      border-radius: 8px;
      padding: 0.75rem 1.125rem;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fafaf8;
    }

    .info-card-icon { font-size: 18px; flex-shrink: 0; }
    .info-card-body { flex: 1; }

    .info-card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 1px;
    }

    .info-card-value {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .info-card.loading .info-card-value { color: #bbb; font-weight: 400; }
    .info-card.error   .info-card-value { color: #c0392b; font-weight: 400; }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <img class="app-logo"
         src="https://rok-chattn-web.s3.us-east-1.amazonaws.com/CityLogosSeals/1.%20full%20color%20badge.png"
         alt="City of Chattanooga" />
    <div>
      <div class="app-title">Address Lookup</div>
      <div class="app-subtitle">Find city services for your address</div>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="addressInput" placeholder="e.g. 100 East Main St" />
    <button class="btn" onclick="doSearch()">Search</button>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="result-banner" id="resultBanner">
      <div class="banner-icon" id="bannerIcon"></div>
      <div class="banner-body">
        <div class="banner-headline" id="bannerHeadline"></div>
      </div>
    </div>
    <div class="info-cards" id="infoCards"></div>
  </div>

</div>
<script>
// ── Layer config ──────────────────────────────────────────────────────────────
var ADDRESS_LAYER = 'https://pwgis.chattanooga.gov/arcgis/rest/services/Misc/Addressing_FeatService/FeatureServer/0';
var ADDRESS_FIELD = 'ADDRESS';

var POLYGON_LAYERS = [
  {
    url:   'https://services2.arcgis.com/OIAIimblRxPs0xxc/arcgis/rest/services/Garbage_Service_Areas/FeatureServer/0',
    type:  'simple',
    field: 'Service_Da',
    label: 'Garbage pickup day',
    icon:  '🗑️',
    format: function(val) { return val || 'Not found'; }
  },
  {
    url:   'https://services2.arcgis.com/OIAIimblRxPs0xxc/arcgis/rest/services/Recycle_Service_Areas/FeatureServer/0',
    type:  'biweekly',
    fields: ['Recycle_Day_Int', 'Anchor_Date'],
    label: 'Next recycling pickup',
    icon:  '♻️'
  },
  {
    url:    'https://pwgis.chattanooga.gov/server/rest/services/Administrative_Areas/CouncilDistricts/FeatureServer/0',
    type:   'multi',
    fields: ['COUNCIL', 'REP_COUNCIL'],
    label:  'City council district',
    icon:   '🏛️',
    format: function(attr) {
      var district = attr['COUNCIL']     || '';
      var rep      = attr['REP_COUNCIL'] || '';
      if (district && rep) return 'District ' + district + ' — ' + rep;
      if (district)        return 'District ' + district;
      if (rep)             return rep;
      return 'Not found';
    }
  }
];
// ─────────────────────────────────────────────────────────────────────────────

var _cbIndex = 0;

var DAY_NAMES  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Address normalization ─────────────────────────────────────────────────────
var REPLACEMENTS = [
  [/\bnorth\b/g,'N'],    [/\bsouth\b/g,'S'],
  [/\beast\b/g,'E'],     [/\bwest\b/g,'W'],
  [/\bnortheast\b/g,'NE'],[/\bnorthwest\b/g,'NW'],
  [/\bsoutheast\b/g,'SE'],[/\bsouthwest\b/g,'SW'],
  [/\bstreet\b/g,'ST'],  [/\bavenue\b/g,'AVE'],
  [/\bboulevard\b/g,'BLVD'],[/\bdrive\b/g,'DR'],
  [/\broad\b/g,'RD'],    [/\blane\b/g,'LN'],
  [/\bcourt\b/g,'CT'],   [/\bcircle\b/g,'CIR'],
  [/\bplace\b/g,'PL'],   [/\bparkway\b/g,'PKWY'],
  [/\bterrace\b/g,'TER'],[/\bhighway\b/g,'HWY'],
  [/\btrail\b/g,'TRL'],  [/\bapartment\b/g,'APT'],
  [/\bsuite\b/g,'STE'],  [/[.,#]/g,''],
  [/\s{2,}/g,' ']
];

function normalizeAddress(input) {
  var s = input.trim();
  for (var i = 0; i < REPLACEMENTS.length; i++) {
    s = s.replace(REPLACEMENTS[i][0], REPLACEMENTS[i][1]);
  }
  return s.trim().toUpperCase();
}

// ── Biweekly next-date calculation ───────────────────────────────────────────
// Mirrors the logic from the Arcade implementation, ported to plain JS.
// AGOL date fields come back as epoch milliseconds (integer).
// Recycle_Day_Int: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat

function nextBiweeklyDate(recycleDay, anchorEpochMs) {
  // Parse anchor date — strip time so we're working in whole days
  var anchor = new Date(anchorEpochMs);
  anchor = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());

  // Today with no time component (local date)
  var now   = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var todayDOW = today.getDay(); // 0=Sun … 6=Sat

  // Step 1: find the next calendar occurrence of recycleDay on or after today
  var daysUntil = (recycleDay - todayDOW + 7) % 7;
  var candidate = new Date(today.getTime() + daysUntil * 86400000);

  // Step 2: check if candidate falls on a pickup week using modulo-14
  // daysDiff must be a non-negative multiple of 14 for a pickup week.
  // We work in whole days by using integer arithmetic.
  var msPerDay = 86400000;
  var daysDiff = Math.round((candidate.getTime() - anchor.getTime()) / msPerDay);

  // Normalize to positive — anchor may be in future relative to candidate
  // (shouldn't happen with real data, but guard against it)
  if (daysDiff < 0) {
    daysDiff = ((daysDiff % 14) + 14) % 14; // bring to range 0–13
  }

  var weekNumber = Math.floor(Math.abs(daysDiff) / 7);
  var isPickupWeek = (weekNumber % 2 === 0);

  // If not a pickup week, advance by 7 days to the next occurrence
  var nextPickup = isPickupWeek
    ? candidate
    : new Date(candidate.getTime() + 7 * 86400000);

  // ── Holiday makeup logic ────────────────────────────────────────────────────
  // If pickup falls on Christmas Day or Thanksgiving, service moves to
  // the following Saturday of that same week.
  var pickupYear  = nextPickup.getFullYear();
  var pickupMonth = nextPickup.getMonth(); // 0-indexed
  var pickupDate  = nextPickup.getDate();
  var pickupDOW   = nextPickup.getDay();

  // Christmas: December 25
  var isChristmas = (pickupMonth === 11 && pickupDate === 25);

  // Thanksgiving: 4th Thursday of November
  // Find the first Thursday of November, then add 21 days
  var nov1        = new Date(pickupYear, 10, 1);
  var nov1DOW     = nov1.getDay();
  var daysToThurs = (4 - nov1DOW + 7) % 7;      // days from Nov 1 to first Thursday
  var thanksgiving = new Date(pickupYear, 10, 1 + daysToThurs + 21); // +21 = 3 more weeks
  var isThanksgiving = (nextPickup.getTime() === thanksgiving.getTime());

  var holidayNotice = '';
  if ((isChristmas || isThanksgiving) && pickupDOW >= 1 && pickupDOW <= 5) {
    // Bump to Saturday of that week
    var daysToSat = 6 - pickupDOW;
    nextPickup    = new Date(nextPickup.getTime() + daysToSat * msPerDay);
    holidayNotice = ' (makeup — holiday week)';
  }

  // ── Format result ────────────────────────────────────────────────────────────
  var daysAway = Math.round((nextPickup.getTime() - today.getTime()) / msPerDay);
  var label = DAY_NAMES[nextPickup.getDay()] + ', ' +
              MON_NAMES[nextPickup.getMonth()] + ' ' + nextPickup.getDate();

  if (daysAway === 0) {
    return 'Today — ' + label + holidayNotice;
  } else if (daysAway === 1) {
    return 'Tomorrow — ' + label + holidayNotice;
  } else if (daysAway <= 7) {
    return label + ' (' + daysAway + ' days)' + holidayNotice;
  } else {
    return label + holidayNotice;  // NOTE: no unary + before label — that was the bug from before
  }
}

// ── JSONP helper ──────────────────────────────────────────────────────────────
function jsonp(url, params, callback) {
  var cbName = '__agscb' + (++_cbIndex);
  var timeout;

  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    if (script.parentNode) document.head.removeChild(script);
    callback(null, data);
  };

  params.callback = cbName;
  params.f = 'json';

  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');

  var script = document.createElement('script');
  script.src = url + '?' + qs;
  script.onerror = function() {
    clearTimeout(timeout);
    delete window[cbName];
    if (script.parentNode) document.head.removeChild(script);
    callback(new Error('Script load failed.'));
  };

  timeout = setTimeout(function() {
    delete window[cbName];
    if (script.parentNode) document.head.removeChild(script);
    callback(new Error('Request timed out.'));
  }, 10000);

  document.head.appendChild(script);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
document.getElementById('addressInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function showBanner(type, headline) {
  var icons = { match: '✓', 'no-match': '✕', error: '⚠', loading: '' };
  document.getElementById('resultBanner').className = 'result-banner ' + type;
  document.getElementById('bannerIcon').textContent = icons[type] || '';
  var hl = document.getElementById('bannerHeadline');
  hl.innerHTML = type === 'loading'
    ? headline + '<span class="loading-dots"></span>'
    : headline;
}

function renderCards(cards) {
  var container = document.getElementById('infoCards');
  container.innerHTML = '';
  cards.forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'info-card' + (c.state ? ' ' + c.state : '');
    div.innerHTML =
      '<div class="info-card-icon">' + c.icon + '</div>' +
      '<div class="info-card-body">' +
        '<div class="info-card-label">' + c.label + '</div>' +
        '<div class="info-card-value">' + c.value + '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

// ── Main search ───────────────────────────────────────────────────────────────
function doSearch() {
  var raw = document.getElementById('addressInput').value.trim();
  if (!raw) return;

  var wrap = document.getElementById('resultWrap');
  wrap.style.display = 'block';
  showBanner('loading', 'Searching');
  document.getElementById('infoCards').innerHTML = '';

  var normalized = normalizeAddress(raw);
  var escaped    = normalized.replace(/'/g, "''");

  function tryAddress(where, isFallback) {
    jsonp(ADDRESS_LAYER + '/query', {
      where:             where,
      outFields:         ADDRESS_FIELD,
      returnGeometry:    'true',
      resultRecordCount: '1'
    }, function(err, json) {
      if (err || json.error || !json.features || json.features.length === 0) {
        if (!isFallback) {
          var parts      = escaped.split(' ');
          var prefix     = parts.slice(0, Math.min(3, parts.length)).join(' ');
          tryAddress(ADDRESS_FIELD + " LIKE '" + prefix + "%'", true);
        } else {
          showBanner('no-match', 'We could not find a matching address within city limits.');
        }
        return;
      }

      showBanner('match', 'Yes, this address is within Chattanooga city limits.');

      var geom = json.features[0].geometry;
      var sr   = json.spatialReference || { wkid: 4326 };

      // Show loading placeholders for each service
      renderCards(POLYGON_LAYERS.map(function(l) {
        return { icon: l.icon, label: l.label, value: 'Looking up\u2026', state: 'loading' };
      }));

      // Query each polygon layer in parallel
      var results = new Array(POLYGON_LAYERS.length);
      var pending = POLYGON_LAYERS.length;

      POLYGON_LAYERS.forEach(function(layer, idx) {
        var pointJson = JSON.stringify({
          x: geom.x,
          y: geom.y,
          spatialReference: sr
        });

        var outFields = (layer.type === 'biweekly' || layer.type === 'multi')
          ? layer.fields.join(',')
          : layer.field;

        jsonp(layer.url + '/query', {
          geometry:          pointJson,
          geometryType:      'esriGeometryPoint',
          spatialRel:        'esriSpatialRelIntersects',
          outFields:         outFields,
          returnGeometry:    'false',
          resultRecordCount: '1'
        }, function(err2, json2) {
          var value = 'Not found';
          var state = '';

          if (!err2 && !json2.error && json2.features && json2.features.length > 0) {
            var attr = json2.features[0].attributes;

            if (layer.type === 'biweekly') {
              // Recycle_Day_Int: integer day-of-week
              // Anchor_Date: epoch milliseconds from AGOL
              var recycleDay = attr['Recycle_Day_Int'];
              var anchorMs   = attr['Anchor_Date'];

              if (recycleDay !== null && recycleDay !== undefined && anchorMs) {
                try {
                  value = nextBiweeklyDate(recycleDay, anchorMs);
                } catch(e) {
                  value = 'Calculation error';
                  state = 'error';
                }
              } else {
                value = 'Data unavailable';
                state = 'error';
              }
            } else if (layer.type === 'multi') {
              value = layer.format(attr);
            } else {
              value = attr[layer.field] || 'Not found';
            }
          } else if (err2) {
            value = 'Service unavailable';
            state = 'error';
          }

          results[idx] = { icon: layer.icon, label: layer.label, value: value, state: state };
          pending--;
          if (pending === 0) renderCards(results);
        });
      });
    });
  }

  tryAddress(ADDRESS_FIELD + " = '" + escaped + "'", false);
}
</script>
</body>
</html>
